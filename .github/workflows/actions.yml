name: Timer

on:
  schedule:
    - cron:  '0 0 * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: 'main'
      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version: '16.14.0'
      - name: Debug runtime version
        run: |
          git rev-parse HEAD
          node -e "const fs=require('fs');const t=fs.readFileSync('./app/service/wxNotify.js','utf8');console.log('wxNotifyHasCtxPattern=',/\\{\\s*ctx\\s*,\\s*app\\s*,\\s*service\\s*\\}/.test(t));console.log('wxNotifyHasMarker=',t.includes('marker=wxNotify_v2_enter'));"
      - name: Depend install and serve
        env:
          WXAPPID: ${{ secrets.WXAPPID }}
          WXSECRET: ${{ secrets.WXSECRET }}
          WXTOKEN: ${{ secrets.token }}
          TEMPLATEID: ${{ secrets.TEMPLATEID }}
          TIANXINGKEY: ${{ secrets.TIANXINGKEY }} 
          AMAPKEY: ${{ secrets.AMAPKEY }}
        run: |
          npm install
          npm run startac
          sleep 15
      - name: Send Notify
        run: curl --retry 5 --retry-delay 3 --retry-connrefused --fail-with-body -sS -X POST http://127.0.0.1:7001/sendNotify
      - name: Stop Service
        run: npm run stop